name: Agent transparency

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  transparency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compare PR against base
        if: github.event_name == 'pull_request'
        run: node scripts/check-agent-transparency.js --base ${{ github.event.pull_request.base.sha }} --head ${{ github.event.pull_request.head.sha }}

      - name: Compare push against previous commit
        if: github.event_name == 'push'
        run: node scripts/check-agent-transparency.js --base HEAD~1 --head HEAD
